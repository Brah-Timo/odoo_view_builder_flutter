name: odoo_view_builder_flutter
description: A professional visual editor for building Odoo XML views via Drag & Drop. Supports Form, Tree and Kanban views with real-time XML preview and export.
version: 1.0.0+1
repository: https://github.com/Brah-Timo/odoo_view_builder_flutter
homepage: https://github.com/Brah-Timo/odoo_view_builder_flutter

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # XML Processing
  xml: ^6.4.2

  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # Networking
  dio: ^5.4.1
  http: ^1.2.0

  # UI & Layout
  flutter_staggered_grid_view: ^0.7.0
  reorderables: ^0.6.0
  google_fonts: ^6.1.0

  # Drag & Drop
  dotted_border: ^2.1.0

  # Export & Share
  share_plus: ^7.2.2
  file_saver: ^0.2.14
  universal_html: ^2.2.4

  # Code Highlighting
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  collection: ^1.18.0

  # Logging (used by analytics/crash services)
  logging: ^1.2.0

  # Icons
  cupertino_icons: ^1.0.6
  material_symbols_icons: ^4.2719.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/samples/
